{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams – {{ contest.name }}</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/team.css' %}">
</head>


<body>
    {% include "app/nav.html" %}

    <main class="dashboard-container">
        <header class="dashboard-header">
            <h1 id="h1" class="animate-fade-in">Teams for "{{ contest.name }}"</h1>
        </header>


        <div class="glass-panel animate-fade-in delay-1">
            {% if teams %}
            <ul class="teams-list">
                {% for team in teams %}
                <li>
                    <a href="{% url 'team_detail' pk=contest.pk ck=team.pk %}" class="team-card-link">
                        <div class="team-card">
                            <span class="team-name">{{ team.name }}</span>
                            <span class="team-arrow">→</span>
                        </div>
                    </a>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <div class="empty-state">
                <p>No teams registered for this contest yet.</p>
            </div>
            {% endif %}

            <div class="actions-footer">
                <a href="{% url 'contest_detail' pk=contest.pk %}" class="btn btn-secondary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to Contest
                </a>
            </div>
        </div>
    </main>
</body>

</html>
