{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ContestKeeper{% endblock %}</title>
    
    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>

    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/nav.css' %}">
    <link href="{% static 'fonts/origin.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
    {% block extra_head %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">{% trans "Skip to content" %}</a>
    {% include 'app/core/nav.html' %}
    
    <main id="main-content" class="dashboard-container {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}
</body>
</html>
