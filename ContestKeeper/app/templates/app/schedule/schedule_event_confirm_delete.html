{% extends 'app/core/base.html' %}
{% block title %}Delete Schedule Event{% endblock %}
{% block content %}
<div class="form-card">
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete the event: "<strong>{{ object.title }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="background:#ef4444; flex:1;">Yes, delete it</button>
            <a href="{% url 'schedule' contest.pk %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
